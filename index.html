      {id:34, week:9,  day:2, phase:2, focus:"דחיפה כתפיים",    a:"6 Elevated Pike Push-ups",       b:"40s Wall Shoulder Taps",      note:"להעביר משקל בזהירות"},
      {id:35, week:9,  day:3, phase:2, focus:"משיכה איטיות",    a:"5 Pull-ups (6s Negative)",       b:"25s Hollow Body Rocks",       note:"מתח איכותי במיוחד"},
      {id:36, week:9,  day:4, phase:2, focus:"דחיפה נפיצות",   a:"6 Explosive Push-ups",           b:"45s Wall HS (Chest to wall)", note:"נחיתה רכה על כפות הידיים"},

      {id:42, week:11, day:2, phase:3, focus:"עמידת ידיים",     a:"10 HS Kick-up Practice",         b:"AMRAP Pike Push-ups",         note:"ניסיון עמידה חופשית"},
      {id:43, week:11, day:3, phase:3, focus:"מעברים כוח",      a:"5 Straight Bar Dips",            b:"AMRAP Pull-ups",              note:"דחיפה מעל המוט"},
      {id:44, week:11, day:4, phase:3, focus:"בדיקת PR",        a:"20s Hollow Body Hold",           b:"Max Pull-ups (1 Set)",        note:"בדיקת שיא אישי במתח"},
      {id:45, week:12, day:1, phase:3, focus:"ניסיונות MU",     a:"2 Muscle-up Attempts",           b:"AMRAP Diamond Push-ups",      note:"דגש על סיבוב שורש כף יד"},
      {id:46, week:12, day:2, phase:3, focus:"עמידת ידיים",     a:"10 HS Kick-up Practice",         b:"AMRAP Pike Push-ups",         note:"מבט בין הידיים"},
      {id:47, week:12, day:3, phase:3, focus:"מעברים כוח",      a:"6 Straight Bar Dips",            b:"AMRAP Pull-ups",              note:"לרדת עד שהחזה נוגע במוט"},
      {id:48, week:12, day:4, phase:3, focus:"בדיקת PR",        a:"20s Hollow Body Hold",           b:"Max Push-ups (1 Set)",        note:"בדיקת שיא בשכיבות סמיכה"},
      {id:49, week:13, day:1, phase:3, focus:"ניסיונות MU",     a:"3 Muscle-up Attempts",           b:"AMRAP Diamond Push-ups",      note:"התפרצות מקסימלית"},
      {id:50, week:13, day:2, phase:3, focus:"עמידת ידיים",     a:"12 HS Kick-up Practice",         b:"AMRAP Pike Push-ups",         note:"לנסות להחזיק 2 שניות באוויר"},
      {id:51, week:13, day:3, phase:3, focus:"מעברים כוח",      a:"6 Straight Bar Dips",            b:"AMRAP Pull-ups",              note:"עבודה עד כשל טכני"},
      {id:52, week:13, day:4, phase:3, focus:"בדיקת PR",        a:"30s Hollow Body Hold",           b:"Max Pull-ups (1 Set)",        note:"מעקב התקדמות שבועי"},
      {id:53, week:14, day:1, phase:3, focus:"ניסיונות MU",     a:"3 Muscle-up Attempts",           b:"AMRAP Diamond Push-ups",      note:"מינימום תנופה ברגליים"},
      {id:54, week:14, day:2, phase:3, focus:"עמידת ידיים",     a:"12 HS Kick-up Practice",         b:"AMRAP Pike Push-ups",         note:"תפיסת הרצפה עם האצבעות"},
      {id:55, week:14, day:3, phase:3, focus:"מעברים כוח",      a:"8 Straight Bar Dips",            b:"AMRAP Pull-ups",              note:"כוח מתפרץ משולב"},
      {id:56, week:14, day:4, phase:3, focus:"בדיקת PR",        a:"30s Hollow Body Hold",           b:"Max Push-ups (1 Set)",        note:"השגת יעדי נפח"},
      {id:57, week:15, day:1, phase:3, focus:"ניסיונות MU",     a:"4 Muscle-up Attempts",           b:"AMRAP Diamond Push-ups",      note:"שבוע שיא - הכל בחוץ"},
      {id:58, week:15, day:2, phase:3, focus:"עמידת ידיים",     a:"15 HS Kick-up Practice",         b:"AMRAP Pike Push-ups",         note:"עמידת ידיים חופשית"},
      {id:59, week:15, day:3, phase:3, focus:"מעברים כוח",      a:"8 Straight Bar Dips",            b:"AMRAP Pull-ups",              note:"מקסימום נפח שבועי"},
      {id:60, week:15, day:4, phase:3, focus:"🏆 טקס סיום",     a:"Max Pull-ups + Max Push-ups",    b:"Max Wall Handstand Hold",     note:"בדיקת התקדמות מול יום 1"},
    ];

    const PHASE_NAMES = {
      1: "פאזה 1 — בסיס כוח",
      2: "פאזה 2 — כוח מתקדם",
      3: "פאזה 3 — עילית ומיומנויות"
    };

    // ─── STORAGE ──────────────────────────────────────────────────────────────
    const STORAGE_KEY = "calix_v2";
    function loadData() {
      try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch {}
      return null;
    }
    function saveData(d) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
    }
    const defaultData = () => ({ unlockedStages:[1], completedStages:[], currentStage:1, history:[] });

    // ─── EXERCISE VISUAL ──────────────────────────────────────────────────────
    function ExerciseVisual({ name, large }) {
      const emoji =
        name.includes("Pull-up") ? "🔼" :
        name.includes("Push-up") ? "💪" :
        name.includes("Handstand") || name.includes("HS") ? "🤸" :
        name.includes("Muscle-up") ? "🏋️" :
        name.includes("Hollow") ? "🫀" :
        name.includes("Crow") ? "🦅" :
        name.includes("Dip") ? "⬇️" :
        name.includes("Row") ? "🔄" :
        name.includes("Knee") || name.includes("Hanging") ? "🦵" :
        name.includes("🏆") || name.includes("Max") ? "🏆" : "⚡";
      return (
        <div className={`flex flex-col items-center justify-center rounded-2xl border border-orange-500/20 ${large ? "w-full aspect-square bg-gradient-to-br from-zinc-900 to-zinc-800" : "w-full h-full bg-zinc-900"}`}>
          <span className={large ? "text-7xl mb-3" : "text-xl"}>{emoji}</span>
          {large && <p className="text-orange-400 text-sm font-semibold text-center px-4 mt-1">{name}</p>}
        </div>
      );
    }

    // ─── WORKOUT SCREEN ───────────────────────────────────────────────────────
    function WorkoutScreen({ stage, onComplete, onBack }) {
      const [minuteIndex, setMinuteIndex] = useState(0);
      const [secondsInMinute, setSecondsInMinute] = useState(0);
      const [totalSeconds, setTotalSeconds] = useState(0);
      const [running, setRunning] = useState(false);
      const [done, setDone] = useState(false);
      const intervalRef = useRef(null);
      const TOTAL = 15;

      const isWarmup = minuteIndex < 3;
      const emomMin = minuteIndex - 3;
      const isAmrap = stage.phase === 3 && emomMin >= 8;
      const isA = !isWarmup && emomMin % 2 === 0;
      const currentEx = isWarmup ? null : isA ? stage.a : stage.b;
      const round = !isWarmup ? Math.floor(emomMin / 2) + 1 : null;
      const progress = (minuteIndex / TOTAL) * 100;
      const timeDisplay = `${String(Math.floor(totalSeconds/60)).padStart(2,"0")}:${String(totalSeconds%60).padStart(2,"0")}`;
      const secLeft = String(59 - secondsInMinute).padStart(2,"0");

      useEffect(() => {
        if (running && !done) {
          intervalRef.current = setInterval(() => {
            setSecondsInMinute(s => {
              if (s >= 59) {
                setMinuteIndex(m => {
                  const next = m + 1;
                  if (next >= TOTAL) { setDone(true); setRunning(false); }
                  return next;
                });
                return 0;
              }
              return s + 1;
            });
            setTotalSeconds(t => t + 1);
          }, 1000);
        }
        return () => clearInterval(intervalRef.current);
      }, [running, done]);

      const skipMinute = () => {
        if (minuteIndex < TOTAL - 1) { setMinuteIndex(m => m+1); setSecondsInMinute(0); }
        else { setDone(true); setRunning(false); }
      };

      if (done) return (
        <div className="flex flex-col items-center justify-center min-h-screen bg-black text-white p-6" dir="rtl">
          <div className="text-8xl mb-4">🏆</div>
          <h2 className="text-4xl font-black text-orange-500 mb-2" style={{fontFamily:"'Bebas Neue',cursive",letterSpacing:"3px"}}>אימון הושלם!</h2>
          <p className="text-zinc-400 mb-1">{stage.focus}</p>
          <p className="text-zinc-500 text-sm mb-2">שבוע {stage.week} | יום {stage.day}</p>
          <p className="text-zinc-600 text-sm mb-8">זמן כולל: {timeDisplay}</p>
          <button onClick={onComplete} className="bg-orange-500 text-black font-black text-xl px-10 py-4 rounded-2xl w-full active:scale-95 transition-transform" style={{fontFamily:"'Bebas Neue',cursive",letterSpacing:"2px"}}>
            סיים ופתח אימון הבא
          </button>
          <button onClick={onBack} className="mt-4 text-zinc-500 text-sm underline">חזור בלי לסמן</button>
        </div>
      );

      return (
        <div className="flex flex-col min-h-screen bg-black text-white" dir="rtl">
          <div className="flex items-center justify-between px-4 pt-5 pb-2">
            <button onClick={onBack} className="text-zinc-400 active:text-orange-500 text-3xl leading-none">‹</button>
            <div className="text-center">
              <h2 className="text-orange-500 font-black text-lg" style={{fontFamily:"'Bebas Neue',cursive",letterSpacing:"2px"}}>
                אימון {stage.id} — {stage.focus}
              </h2>
              <p className="text-zinc-500 text-xs">שבוע {stage.week} | יום {stage.day} | {PHASE_NAMES[stage.phase]}</p>
            </div>
            <div className="text-zinc-400 text-sm" style={{fontFamily:"monospace"}}>{timeDisplay}</div>
          </div>

          <div className="mx-4 h-1.5 bg-zinc-800 rounded-full overflow-hidden">
            <div className="h-full bg-orange-500 rounded-full transition-all duration-1000" style={{width:`${progress}%`}} />
          </div>

          <div className="flex justify-center mt-3">
            {isWarmup ? (
              <span className="bg-blue-500/20 text-blue-400 text-xs font-bold px-3 py-1 rounded-full border border-blue-500/30">
                🔥 חימום — דקה {minuteIndex+1}/3
              </span>
            ) : isAmrap ? (
              <span className="bg-red-500/20 text-red-400 text-xs font-bold px-3 py-1 rounded-full border border-red-500/30">
                🔥 AMRAP — כמה שיותר!
              </span>
            ) : (
              <span className={`text-xs font-bold px-3 py-1 rounded-full border ${isA ? "bg-orange-500/20 text-orange-400 border-orange-500/30" : "bg-purple-500/20 text-purple-400 border-purple-500/30"}`}>
                {isA ? "⚡ תרגיל A" : "💥 תרגיל B"} — סט {round}/6
              </span>
            )}
          </div>

          <div className="px-4 mt-3 flex-1">
            {isWarmup ? (
              <div className="w-full aspect-square bg-gradient-to-br from-zinc-900 to-zinc-800 border border-zinc-700 rounded-2xl flex flex-col items-center justify-center p-6">
                <span className="text-6xl mb-4">🔥</span>
                <h3 className="text-2xl font-black text-white mb-4" style={{fontFamily:"'Bebas Neue',cursive"}}>חימום — סיבובי מפרקים</h3>
                <div className="text-zinc-400 text-sm text-center space-y-1.5">
                  <p>• סיבובי צוואר עדינים</p>
                  <p>• סיבובי כתפיים קדימה ואחורה</p>
                  <p>• סיבובי מרפקים ופרקי כף יד</p>
                  <p>• סיבובי ירכיים וברכיים</p>
                  <p>• הליכה במקום + הרמת ברכיים</p>
                </div>
              </div>
            ) : (
              <div className="w-full aspect-square"><ExerciseVisual name={currentEx} large /></div>
            )}

            {!isWarmup && (
              <div className="mt-3 mx-auto max-w-xs bg-zinc-900/80 border border-zinc-700 rounded-xl px-4 py-2 text-center">
                <p className="text-zinc-400 text-xs">💡 {stage.note}</p>
              </div>
            )}

            {running && !isWarmup && (
              <div className="mt-3 flex justify-center">
                <div className="bg-zinc-900 border border-orange-500/30 rounded-xl px-6 py-2 flex items-center gap-2">
                  <span className="text-zinc-500 text-sm">נותרו</span>
                  <span className="text-orange-500 font-black text-2xl" style={{fontFamily:"monospace"}}>{secLeft}</span>
                  <span className="text-zinc-500 text-sm">שניות</span>
                </div>
              </div>
            )}
          </div>

          <div className="px-4 mt-4">
            <p className="text-zinc-600 text-xs mb-2">מבנה האימון</p>
            <div className="grid grid-cols-5 gap-1.5">
              {[{l:"🔥",i:0},{l:"🔥",i:1},{l:"🔥",i:2},...Array.from({length:12},(_,k)=>({l:k%2===0?"A":"B",i:k+3}))].map(item => (
                <div key={item.i} className={`rounded-lg aspect-square flex items-center justify-center border text-xs font-black transition-all ${
                  item.i < minuteIndex ? "bg-orange-500/10 border-orange-500/40 text-orange-500" :
                  item.i === minuteIndex ? "bg-orange-500/30 border-orange-500 text-white scale-110" :
                  "bg-zinc-900 border-zinc-800 text-zinc-600"
                }`}>{item.l}</div>
              ))}
            </div>
          </div>

          <div className="p-4 mt-3">
            {!running ? (
              <button onClick={() => setRunning(true)} className="w-full bg-orange-500 text-black font-black text-2xl py-5 rounded-2xl active:scale-95 transition-transform shadow-xl shadow-orange-500/20" style={{fontFamily:"'Bebas Neue',cursive",letterSpacing:"4px"}}>
                {totalSeconds === 0 ? "▶ התחל אימון" : "▶ המשך"}
              </button>
            ) : (
              <div className="flex gap-3">
                <button onClick={() => setRunning(false)} className="flex-1 bg-zinc-800 text-white font-bold py-4 rounded-2xl text-sm active:scale-95">⏸ עצור</button>
                <button onClick={skipMinute} className="flex-1 bg-zinc-700 text-orange-400 font-bold py-4 rounded-2xl text-sm border border-orange-500/20 active:scale-95">דקה הבאה ⏭</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── STAGE CARD ───────────────────────────────────────────────────────────
    function StageCard({ stage, isUnlocked, isCompleted, isCurrent, onClick }) {
      return (
        <button onClick={onClick} disabled={!isUnlocked} dir="rtl"
          className={`w-full text-right p-3 rounded-xl border transition-all active:scale-95 ${
            isCurrent ? "bg-orange-500/15 border-orange-500 shadow-lg shadow-orange-500/10" :
            isCompleted ? "bg-zinc-900/60 border-zinc-700/50 opacity-75" :
            isUnlocked ? "bg-zinc-900 border-zinc-700" :
            "bg-zinc-950 border-zinc-800/50 opacity-40"
          }`}>
          <div className="flex items-center gap-3">
            <div className={`w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 font-black text-base ${
              isCompleted ? "bg-green-500/20 text-green-400" :
              isCurrent ? "bg-orange-500 text-black" :
              isUnlocked ? "bg-zinc-800 text-zinc-300" :
              "bg-zinc-900 text-zinc-600"
            }`} style={{fontFamily:"'Bebas Neue',cursive"}}>
              {isCompleted ? "✓" : isUnlocked ? stage.id : "🔒"}
            </div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2">
                <span className={`font-black text-sm ${isCurrent ? "text-orange-400" : isCompleted ? "text-zinc-400" : "text-white"}`} style={{fontFamily:"'Bebas Neue',cursive",letterSpacing:"1px"}}>
                  שבוע {stage.week} יום {stage.day}
                </span>
                {isCurrent && <span className="text-[10px] bg-orange-500 text-black px-1.5 py-0.5 rounded font-bold">עכשיו</span>}
              </div>
              <p className="text-orange-300/70 text-xs font-semibold">{stage.focus}</p>
              <p className="text-zinc-500 text-xs truncate">{stage.a} / {stage.b}</p>
            </div>
            <span className={`text-xs px-2 py-0.5 rounded-full border flex-shrink-0 ${
              stage.phase===1 ? "text-blue-400 border-blue-500/30 bg-blue-500/10" :
              stage.phase===2 ? "text-purple-400 border-purple-500/30 bg-purple-500/10" :
              "text-orange-400 border-orange-500/30 bg-orange-500/10"
            }`}>P{stage.phase}</span>
          </div>
        </button>
      );
    }

    // ─── MAIN APP ─────────────────────────────────────────────────────────────
    function CaliX() {
      const [appData, setAppData] = useState(null);
      const [view, setView] = useState("home");
      const [selectedStage, setSelectedStage] = useState(null);
      const [filterPhase, setFilterPhase] = useState(0);

      useEffect(() => { setAppData(loadData() || defaultData()); }, []);
      useEffect(() => { if (appData) saveData(appData); }, [appData]);

      const handleComplete = useCallback((stageId) => {
        setAppData(prev => {
          const completed = prev.completedStages.includes(stageId) ? prev.completedStages : [...prev.completedStages, stageId];
          const nextId = stageId + 1;
          const unlocked = nextId <= 60 && !prev.unlockedStages.includes(nextId) ? [...prev.unlockedStages, nextId] : prev.unlockedStages;
          const history = [...prev.history, { stageId, date: new Date().toLocaleDateString("he-IL") }];
          return { ...prev, completedStages: completed, unlockedStages: unlocked, currentStage: Math.min(nextId, 60), history };
        });
        setView("home");
      }, []);

      if (!appData) return (
        <div className="min-h-screen bg-black flex items-center justify-center">
          <div className="text-orange-500 text-3xl animate-pulse" style={{fontFamily:"'Bebas Neue',cursive"}}>CALI-X</div>
        </div>
      );

      if (view === "workout" && selectedStage) return (
        <WorkoutScreen stage={selectedStage} onComplete={() => handleComplete(selectedStage.id)} onBack={() => setView("stages")} />
      );

      const currentStage = STAGES.find(s => s.id === appData.currentStage);
      const completedCount = appData.completedStages.length;
      const pct = Math.round((completedCount / 60) * 100);
      const filtered = filterPhase === 0 ? STAGES : STAGES.filter(s => s.phase === filterPhase);

      if (view === "stages") return (
        <div className="min-h-screen bg-black text-white flex flex-col" dir="rtl">
          <div className="sticky top-0 bg-black/95 backdrop-blur z-10 px-4 pt-4 pb-3 border-b border-zinc-800">
            <div className="flex items-center justify-between mb-3">
              <button onClick={() => setView("home")} className="text-zinc-400 active:text-orange-500 text-3xl leading-none">‹</button>
              <h1 className="text-orange-500 font-black text-xl" style={{fontFamily:"'Bebas Neue',cursive",letterSpacing:"3px"}}>15 שבועות | 60 אימונים</h1>
              <span className="text-zinc-500 text-sm">{completedCount}/60</span>
            </div>
            <div className="flex gap-2">
              {[0,1,2,3].map(p => (
                <button key={p} onClick={() => setFilterPhase(p)} className={`flex-1 py-1.5 rounded-lg text-xs font-bold transition-all ${filterPhase===p ? "bg-orange-500 text-black" : "bg-zinc-900 text-zinc-400 border border-zinc-800"}`}>
                  {p===0 ? "הכל" : `פאזה ${p}`}
                </button>
              ))}
            </div>
          </div>
          <div className="flex-1 overflow-y-auto px-4 py-3 space-y-2 pb-8">
            {filtered.map(stage => (
              <StageCard key={stage.id} stage={stage}
                isUnlocked={appData.unlockedStages.includes(stage.id)}
                isCompleted={appData.completedStages.includes(stage.id)}
                isCurrent={stage.id === appData.currentStage}
                onClick={() => { setSelectedStage(stage); setView("workout"); }}
              />
            ))}
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-black text-white flex flex-col" dir="rtl">
          <div className="flex items-center justify-between px-5 pt-6">
            <h1 className="text-orange-500 font-black text-4xl tracking-widest" style={{fontFamily:"'Bebas Neue',cursive"}}>CALI-X</h1>
            <button onClick={() => setView("stages")} className="text-zinc-400 text-sm border border-zinc-700 px-3 py-1.5 rounded-lg active:bg-zinc-800">כל האימונים</button>
          </div>

          <div className="mx-5 mt-4 bg-gradient-to-l from-orange-500/5 to-orange-500/15 border border-orange-500/20 rounded-2xl p-4">
            <p className="text-orange-400 text-xs font-bold uppercase tracking-widest mb-1">🔥 {PHASE_NAMES[currentStage.phase]}</p>
            <h2 className="text-white font-black text-xl mb-1" style={{fontFamily:"'Bebas Neue',cursive",letterSpacing:"2px"}}>
              שבוע {currentStage.week} | יום {currentStage.day} — {currentStage.focus}
            </h2>
            <div className="flex gap-4 mt-2">
              <div className="flex-1">
                <p className="text-zinc-500 text-[10px] uppercase tracking-wider">תרגיל A</p>
                <p className="text-zinc-200 text-xs font-medium mt-0.5">{currentStage.a}</p>
              </div>
              <div className="w-px bg-zinc-700 flex-shrink-0" />
              <div className="flex-1">
                <p className="text-zinc-500 text-[10px] uppercase tracking-wider">תרגיל B</p>
                <p className="text-zinc-200 text-xs font-medium mt-0.5">{currentStage.b}</p>
              </div>
            </div>
            <p className="text-zinc-500 text-xs mt-3 border-t border-zinc-700/50 pt-2">💡 {currentStage.note}</p>
          </div>

          <div className="mx-5 mt-4">
            <div className="flex justify-between items-center mb-2">
              <span className="text-zinc-500 text-xs">התקדמות כללית</span>
              <span className="text-orange-500 font-black text-sm">{pct}%</span>
            </div>
            <div className="h-2 bg-zinc-800 rounded-full overflow-hidden">
              <div className="h-full bg-gradient-to-r from-orange-600 to-orange-400 rounded-full transition-all duration-700" style={{width:`${pct}%`}} />
            </div>
            <div className="flex justify-between mt-1">
              <span className="text-zinc-600 text-[10px]">אימון 1</span>
              <span className="text-zinc-400 text-[10px]">{completedCount} / 60 הושלמו</span>
              <span className="text-zinc-600 text-[10px]">אימון 60</span>
            </div>
          </div>

          <div className="mx-5 mt-4 grid grid-cols-3 gap-3">
            {[{label:"הושלמו",value:completedCount,icon:"✅"},{label:"אימון נוכחי",value:appData.currentStage,icon:"⚡"},{label:"נותרו",value:60-completedCount,icon:"🎯"}].map(s => (
              <div key={s.label} className="bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-center">
                <div className="text-xl mb-1">{s.icon}</div>
                <div className="text-white font-black text-xl" style={{fontFamily:"'Bebas Neue',cursive"}}>{s.value}</div>
                <div className="text-zinc-500 text-[10px]">{s.label}</div>
              </div>
            ))}
          </div>

          <div className="mx-5 mt-4 space-y-2">
            {[1,2,3].map(phase => {
              const ph = STAGES.filter(s => s.phase === phase);
              const done = ph.filter(s => appData.completedStages.includes(s.id)).length;
              return (
                <div key={phase} className="flex items-center gap-3">
                  <span className={`text-[10px] font-bold w-14 flex-shrink-0 ${phase===1?"text-blue-400":phase===2?"text-purple-400":"text-orange-400"}`}>פאזה {phase}</span>
                  <div className="flex-1 h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                    <div className={`h-full rounded-full transition-all duration-700 ${phase===1?"bg-blue-500":phase===2?"bg-purple-500":"bg-orange-500"}`} style={{width:`${(done/20)*100}%`}} />
                  </div>
                  <span className="text-zinc-500 text-[10px] w-10 text-left">{done}/20</span>
                </div>
              );
            })}
          </div>

          <div className="mx-5 mt-6 mb-8">
            <button onClick={() => { setSelectedStage(currentStage); setView("workout"); }}
              className="w-full bg-orange-500 text-black font-black text-2xl py-5 rounded-2xl flex items-center justify-center gap-3 active:scale-95 transition-all shadow-xl shadow-orange-500/20"
              style={{fontFamily:"'Bebas Neue',cursive",letterSpacing:"4px"}}>
              ▶ התחל אימון
            </button>

            {appData.history.length > 0 && (
              <div className="mt-4 bg-zinc-900 border border-zinc-800 rounded-xl p-3">
                <p className="text-zinc-500 text-xs mb-2 font-semibold">אימונים אחרונים</p>
                <div className="space-y-1.5">
                  {appData.history.slice(-4).reverse().map((h, i) => {
                    const s = STAGES.find(st => st.id === h.stageId);
                    return (
                      <div key={i} className="flex justify-between items-center">
                        <span className="text-zinc-300 text-xs">אימון {h.stageId}{s ? ` — ${s.focus}` : ""}</span>
                        <span className="text-zinc-600 text-xs">{h.date}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<CaliX />);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/calixe/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
